<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<!-- Phase Admin-UX-Next-3: 親ページ HTML 自体のブラウザキャッシュを完全無効化。
     これが無いと、 親ページの JS (showNavOverlay / タイムアウト保険 / 閉じるボタン等) が
     古いまま使われ続けて 修正が反映されない事故になる。 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>管理画面 - サンロくんのほけんしつ</title>
<style>
/*
  yakusokuai.jp/admin/index.html
  ─────────────────────────────────────────────
  GAS Web App の admin ページを iframe で表示する。

  目的:
   1) yakusokuai.jp ドメインで管理画面を提供
   2) GAS 標準フッターを画面外に追い出す (iframe height +60px)
   3) iframe 内 navigation の「真っ白時間」 を 親オーバーレイで覆い隠す
      (フォーム submit → 新ページロード中の 1-3秒を視覚的に埋める)
*/
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow:hidden;height:100vh;width:100%;}
body{background:#f5f5f4;font-family:-apple-system,sans-serif;}
iframe{width:100%;height:calc(100vh + 60px);border:none;display:block;}
.loading-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;color:#666;
}
.spinner{
  width:40px;height:40px;border:4px solid #e5e5e5;border-top:4px solid #22c55e;
  border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* iframe navigation 中の オーバーレイ (親ページに常駐) */
#navOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(245,245,244,0.92);backdrop-filter:blur(2px);
  z-index:9999;align-items:center;justify-content:center;flex-direction:column;
  font-size:14px;color:#166534;font-weight:600;
  transition:opacity 0.15s;
}
#navOverlay .big-spinner{
  width:52px;height:52px;border:5px solid #d1fae5;border-top-color:#16a34a;
  border-radius:50%;animation:spin 0.6s linear infinite;margin-bottom:16px;
}
#navOverlay .sub{font-size:11px;color:#888;margin-top:8px;font-weight:normal;}

/* Phase Admin-UX-Next-3: overlay の 「✕ 閉じる」 ボタン (手動解除の安全弁) */
#navOverlayCloseBtn{
  margin-top:20px;background:#ef4444;color:#fff;border:none;border-radius:6px;
  padding:8px 18px;font-size:12px;font-weight:bold;cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
#navOverlayCloseBtn:hover{background:#dc2626;}
#navOverlayCloseBtn:active{transform:translateY(1px);}

/* 強制リロードボタン (右上に固定) - iframe より上に表示し、 GAS の HTML キャッシュをバイパス */
#forceReloadBtn{
  position:fixed;top:8px;right:10px;z-index:10001;
  background:#16a34a;color:#fff;border:none;border-radius:6px;
  padding:6px 12px;font-size:11px;font-weight:bold;cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
  opacity:0.85;transition:opacity 0.15s;
}
#forceReloadBtn:hover{opacity:1;}
#forceReloadBtn:active{transform:translateY(1px);}
#forceReloadBtn.hidden{display:none;}
</style>
</head>
<body>
<div id="loading" class="loading-screen">
  <div class="spinner"></div>
  <div>管理画面を読込中…</div>
</div>
<iframe id="app" style="display:none;"></iframe>

<!-- 右上の強制リロードボタン (キャッシュバイパス用) -->
<button id="forceReloadBtn" title="親ページごと完全リロード (キャッシュ完全無効化)">↻ 最新版</button>

<!-- iframe navigation 中のオーバーレイ (親ページに常駐) -->
<div id="navOverlay">
  <div class="big-spinner"></div>
  <div id="navOverlayMsg">読込中... 数秒お待ちください</div>
  <div class="sub" id="navOverlaySub">サーバーで処理中です</div>
  <!-- Phase Admin-UX-Next-3: 手動「閉じる」 ボタン (固まり時のユーザー脱出口) -->
  <button id="navOverlayCloseBtn" type="button">✕ 閉じる</button>
</div>

<script>
(function(){
  var GAS_URL='https://script.google.com/macros/s/AKfycbwqJPueCoeMtpY8WcCAHQjYXIROi8VAaqsbZmuf2iUQ65MG6teaJOC2CwZiGrUNlsd6/exec';
  var params=new URLSearchParams(window.location.search);

  // Phase Admin-UX-Next-3: ビルドタグ (Cmd+Shift+R 不要を期待する自己診断用)
  var BUILD_TAG='admin-ux-next-3:'+(new Date().toISOString().substring(0,10));
  console.log('[adminParent] loaded build='+BUILD_TAG);

  // fmPrintMode=1 が指定されていれば 食品マスタ印刷ビューを iframe で表示
  var isPrintMode = params.get('fmPrintMode')==='1';
  if(isPrintMode){
    document.title='食品マスタ印刷ビュー - サンロくんのほけんしつ';
  }

  // 親ページに渡された URL パラメータを GAS にそのまま転送
  var fwdParams=[
    'key','activeTab',
    'fmPrintMode',
    'fmChain','fmMenu','fmSourceType','fmSource','fmActive','fmPage','fmPageSize',
    'fcStatus','fcPriority','fcAction',
    // Phase Admin-UX-Next-1: 操作ログタブ用フィルタ
    'alAction','alActor','alFrom','alTo','alKeyword','alPage','alPageSize'
  ];
  var qs='page=admin';
  fwdParams.forEach(function(n){
    var v=params.get(n);
    if(v!==null && v!==''){
      qs+='&'+encodeURIComponent(n)+'='+encodeURIComponent(v);
    }
  });

  var iframe=document.getElementById('app');
  var navOverlay=document.getElementById('navOverlay');
  var navMsg=document.getElementById('navOverlayMsg');
  var navSub=document.getElementById('navOverlaySub');
  var navCloseBtn=document.getElementById('navOverlayCloseBtn');
  var loadingScreen=document.getElementById('loading');

  // iframe 初回ロード完了 (= 親 iframe[id=app] の src 自体が新しいURLに切り替わった時のみ発火)
  iframe.addEventListener('load',function(){
    console.log('[adminParent] iframe load event fired');
    if(loadingScreen) loadingScreen.style.display='none';
    iframe.style.display='block';
    hideNavOverlay();
  });

  // フォールバック: load イベントが発火しない場合でも 3秒後に表示
  setTimeout(function(){
    if(iframe.style.display==='none'){
      if(loadingScreen) loadingScreen.style.display='none';
      iframe.style.display='block';
    }
  },3000);

  // ──────────────────────────────────────────────────────────────────
  // Phase Admin-UX-Next-3: navOverlay 管理 (10秒タイムアウト保険 + 手動閉じる)
  //   重要: 3層 iframe 構造で 親 iframe[id=app] の load イベントが
  //         サンドボックス内ナビゲーションでは発火しないため、
  //         GAS 側の admin_loading_end postMessage が来ない場合は
  //         10秒タイムアウトで強制 hide する。
  //   さらに ✕ 閉じる ボタンで ユーザーが手動解除も可能 (最終安全弁)。
  // ──────────────────────────────────────────────────────────────────
  var navOverlayTimer=null;
  function hideNavOverlay(){
    console.log('[adminParent] hideNavOverlay called');
    if(navOverlay) navOverlay.style.display='none';
    if(navMsg) navMsg.textContent='読込中... 数秒お待ちください';
    if(navSub) navSub.textContent='サーバーで処理中です';
    if(navOverlayTimer){ clearTimeout(navOverlayTimer); navOverlayTimer=null; }
  }
  function showNavOverlay(msg){
    console.log('[adminParent] showNavOverlay called msg=', msg);
    if(!navOverlay) return;
    if(navMsg && msg) navMsg.textContent=String(msg).substring(0,100);
    if(navSub) navSub.textContent='サーバーで処理中です (10秒で自動解除)';
    navOverlay.style.display='flex';
    if(navOverlayTimer) clearTimeout(navOverlayTimer);
    // タイムアウトを 30秒 → 10秒 に短縮 (Phase Admin-UX-Next-3)
    navOverlayTimer=setTimeout(function(){
      console.warn('[adminParent] navOverlay 10s timeout fired - force hiding');
      if(navMsg) navMsg.textContent='処理が長引いています。 画面が更新されない場合は ↻ 最新版 を押してください。';
      if(navSub) navSub.textContent='10秒経過したので 自動で閉じます';
      setTimeout(hideNavOverlay,2500);
    },10000);
  }

  // 手動「✕ 閉じる」ボタン (固まり時のユーザー脱出口)
  if(navCloseBtn){
    navCloseBtn.addEventListener('click',function(){
      console.log('[adminParent] navOverlay manual close clicked');
      hideNavOverlay();
    });
  }

  // 子 (iframe = GAS admin) から postMessage を受信
  window.addEventListener('message',function(e){
    if(!e || !e.data) return;
    var data=e.data;
    if(typeof data!=='object') return;
    console.log('[adminParent] message received type=', data.type, 'msg=', data.msg);
    if(data.type==='admin_loading_start'){
      showNavOverlay(data.msg);
    }else if(data.type==='admin_loading_end'){
      hideNavOverlay();
    }else if(data.type==='admin_close_print_view'){
      // 印刷ビューの「閉じる」ボタンから通知 → このタブを閉じる
      try{ window.close(); }catch(_){}
    }
  });

  iframe.src=GAS_URL+'?'+qs;

  // ──────────────────────────────────────────────────────────────────
  // Phase Admin-UX-Next-3: 「↻ 最新版」 ボタンは 親ページごと完全リロード
  //   以前は iframe.src しか更新しなかったため、 親ページの JS (showNavOverlay 等) は
  //   ブラウザキャッシュの古い版が動き続け、 修正が反映されない事故があった。
  //   親ページの URL に _t=<unix時刻> を付けて window.location.href で遷移すれば、
  //   親 HTML + 親 JS + iframe すべてが最新版になる。
  // ──────────────────────────────────────────────────────────────────
  var reloadBtn=document.getElementById('forceReloadBtn');
  if(reloadBtn){
    if(isPrintMode){ reloadBtn.classList.add('hidden'); }
    reloadBtn.addEventListener('click',function(){
      console.log('[adminParent] forceReload clicked - reloading parent page itself');
      if(navOverlay){
        if(navMsg) navMsg.textContent='最新版を取得中...';
        navOverlay.style.display='flex';
      }
      // 親ページ自体を リロード (_t= でブラウザキャッシュも バイパス)
      var purl=window.location.href.replace(/[?&]_t=\d+/g,'');
      var psep=purl.indexOf('?')>=0 ? '&' : '?';
      window.location.href=purl+psep+'_t='+Date.now();
    });
  }
})();
</script>
</body>
</html>
