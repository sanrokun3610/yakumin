<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>体重を記録 - サンロくんのほけんしつ</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="/common/common.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// LIFF内ブラウザ強キャッシュ対策（検査値と同方式）: バージョン違いで強制リロード
(function(){var V='v3.28.0';try{var s=localStorage.getItem('weight_version');if(s&&s!==V){localStorage.setItem('weight_version',V);location.replace(location.pathname+'?v='+V+'&t='+Date.now());return;}localStorage.setItem('weight_version',V);}catch(e){}})();
</script>
</head>
<body>
<div class="sanro-header">
  <div class="sanro-header-title">⚖️ 体重を記録</div>
  <div class="sanro-username"></div>
</div>
<div id="sanro-status" class="sanro-status"></div>

<div id="content" class="hidden">
  <div class="sanro-section">
    <div class="sanro-section-title">📝 今日の体重</div>
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px">
      <input type="text" id="weight-input" class="sanro-input" placeholder="例: 55.5" inputmode="decimal" autocomplete="off" autofocus enterkeyhint="done">
      <span style="font-size:18px;font-weight:bold;color:#78350f">kg</span>
    </div>
    <button id="btn-save" class="sanro-btn primary">記録する</button>
  </div>

  <div class="sanro-section">
    <div class="sanro-section-title">📊 直近の記録</div>
    <div id="recent-list">読込中…</div>
    <div style="height:8px"></div>
    <button class="sanro-btn outline" id="btn-graph">📈 グラフを見る</button>
  </div>

  <!-- v3.17.9 くまさんFB: 「完了してLINEに戻る」廃止 → ヘッダー左上の共通 ← 戻るに統一 -->
</div>

<!-- 2026-06-25: 体重推移グラフを yakusokuai.jp 内で描画（旧: script.google.com へ遷移→Google警告画面が出る問題を解消） -->
<div id="graph-modal" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:16px;padding:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:16px;font-weight:700;color:#78350f">⚖️ 体重推移</div>
      <button id="graph-close" style="background:#f0f0f0;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px">✕ 閉じる</button>
    </div>
    <div id="graph-status" style="font-size:13px;color:#888;text-align:center;padding:24px 0">読込中…</div>
    <canvas id="weight-chart" style="display:none"></canvas>
  </div>
</div>

<script src="/common/common.js"></script>
<script>
SanroBoot.init({
  liffId: '2009608282-XNKKXND6',
  deployUrl: 'https://script.google.com/macros/s/AKfycbwqJPueCoeMtpY8WcCAHQjYXIROi8VAaqsbZmuf2iUQ65MG6teaJOC2CwZiGrUNlsd6/exec',
  onReady: function(APP) {
    document.getElementById('content').classList.remove('hidden');
    loadRecent();
    // モバイル制限を回避するため複数回試行 + click も呼ぶ
    var inp = document.getElementById('weight-input');
    function tryFocus() { try { inp.focus(); inp.click(); } catch(e) {} }
    tryFocus();
    setTimeout(tryFocus, 100);
    setTimeout(tryFocus, 300);
    setTimeout(tryFocus, 700);
  }
});

function loadRecent() {
  SanroBoot.apiGet('weight_recent').then(function(data) {
    var box = document.getElementById('recent-list');
    if (!data || !data.ok || !data.items || data.items.length === 0) {
      box.innerHTML = '<div style="padding:12px;color:#888;font-size:12px;text-align:center">記録がまだありません</div>';
      return;
    }
    box.innerHTML = '';
    data.items.forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'sanro-list-item';
      row.innerHTML = '<span class="date">' + SanroBoot.esc(item.date || '') + '</span><span class="value">' + SanroBoot.esc(item.weight || '') + ' kg</span>';
      box.appendChild(row);
    });
  }).catch(function(err) {
    document.getElementById('recent-list').innerHTML = '<div style="color:#dc2626">読込失敗</div>';
  });
}

document.getElementById('btn-save').addEventListener('click', function() {
  var v = document.getElementById('weight-input').value.trim()
    .replace(/[０-９]/g, function(ch){return String.fromCharCode(ch.charCodeAt(0)-0xFEE0);})
    .replace(/．/g, '.').replace(/[kgKG\s]/g, '');
  var n = Number(v);
  if (isNaN(n) || n < 20 || n > 200) { SanroBoot.toast('20〜200 kg の範囲で入力してください', 'error'); return; }
  SanroBoot.apiPost('weight_save', { weight: n }).then(function(data) {
    if (data && data.ok) {
      SanroBoot.toast('✅ ' + n + 'kg を記録しました', 'success');
      document.getElementById('weight-input').value = '';
      loadRecent();
    } else {
      SanroBoot.toast('記録失敗: ' + (data && data.error ? data.error : 'unknown'), 'error');
    }
  });
});

var weightChart = null;
function openGraph() {
  var modal = document.getElementById('graph-modal');
  var status = document.getElementById('graph-status');
  var canvas = document.getElementById('weight-chart');
  modal.classList.remove('hidden');
  status.style.display = 'block';
  status.textContent = '読込中…';
  canvas.style.display = 'none';
  // weight_data API（GAS: handleWeightGraphData_）で6ヶ月分を取得し、その場で Chart.js 描画
  SanroBoot.apiGet('weight_data').then(function(res) {
    var data = (res && res.data) || [];
    if (!data.length) { status.textContent = 'まだ記録がありません'; return; }
    data.sort(function(a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
    var labels = data.map(function(d) { var p = String(d.date).split('-'); return p.length === 3 ? (p[1] + '/' + p[2]) : d.date; });
    var values = data.map(function(d) { return d.weight; });
    status.style.display = 'none';
    canvas.style.display = 'block';
    if (weightChart) weightChart.destroy();
    weightChart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: [{
        label: '体重(kg)', data: values,
        borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.12)',
        fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#22c55e',
      }] },
      options: { responsive: true, plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: false, title: { display: true, text: 'kg' } },
                  x: { title: { display: true, text: '日付' } } } },
    });
  }).catch(function(err) {
    status.textContent = '読込失敗: ' + (err && err.message ? err.message : err);
  });
}
document.getElementById('btn-graph').addEventListener('click', openGraph);
document.getElementById('graph-close').addEventListener('click', function() {
  document.getElementById('graph-modal').classList.add('hidden');
});
document.getElementById('graph-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.add('hidden');
});

// v3.17.9: btn-close 廃止 (共通 sanro-back-btn が SanroBoot.close を呼ぶ)
</script>
</body>
</html>
