<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>記録をみる - サンロくんのほけんしつ</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="/common/common.css">
<script>
// LIFF内ブラウザ強キャッシュ対策（検査値と同方式）: バージョン違いで強制リロード
(function(){var V='v3.28.0';try{var s=localStorage.getItem('records_version');if(s&&s!==V){localStorage.setItem('records_version',V);location.replace(location.pathname+'?v='+V+'&t='+Date.now());return;}localStorage.setItem('records_version',V);}catch(e){}})();
</script>
</head>
<body>
<div class="sanro-header">
  <div class="sanro-header-title">📋 記録をみる</div>
  <div class="sanro-username"></div>
</div>
<div id="sanro-status" class="sanro-status"></div>

<div id="content" class="hidden">
  <div class="sanro-section">
    <div class="sanro-section-title">🍱 今日の食事</div>
    <div id="today-meals">読込中…</div>
  </div>

  <div class="sanro-section">
    <div class="sanro-section-title">📅 カレンダーで見る</div>
    <button class="sanro-btn primary" id="btn-calendar">今月のカレンダー</button>
  </div>

  <div class="sanro-section">
    <div class="sanro-section-title">📊 グラフ</div>
    <button class="sanro-btn outline" id="btn-weight-graph">⚖️ 体重グラフ</button>
    <button class="sanro-btn outline" id="btn-bp-graph">🩺 血圧グラフ</button>
  </div>

  <!-- v3.17.9 くまさんFB: 「完了してLINEに戻る」廃止 → ヘッダー左上の共通 ← 戻るに統一 -->
</div>

<script src="/common/common.js"></script>
<script>
SanroBoot.init({
  liffId: '2009608282-t5sF6Kl3',
  deployUrl: 'https://script.google.com/macros/s/AKfycbwqJPueCoeMtpY8WcCAHQjYXIROi8VAaqsbZmuf2iUQ65MG6teaJOC2CwZiGrUNlsd6/exec',
  onReady: function(APP) {
    document.getElementById('content').classList.remove('hidden');
    loadTodayMeals();
  }
});

function loadTodayMeals() {
  SanroBoot.apiGet('records_today').then(function(data) {
    var box = document.getElementById('today-meals');
    if (!data || !data.ok || !data.items || data.items.length === 0) {
      box.innerHTML = '<div style="padding:12px;color:#888;font-size:12px;text-align:center">今日の記録はまだありません</div>';
      return;
    }
    box.innerHTML = '';
    var totalKcal = 0;
    data.items.forEach(function(it) {
      totalKcal += it.kcal || 0;
      var row = document.createElement('div');
      row.className = 'sanro-list-item';
      row.innerHTML = '<span><span class="date">' + SanroBoot.esc(it.time || '') + '</span>　' + SanroBoot.esc(it.name || '') + '</span><span class="value">' + (it.kcal || 0) + ' kcal</span>';
      box.appendChild(row);
    });
    var total = document.createElement('div');
    total.style.cssText = 'padding:10px;background:#fef3c7;border-radius:8px;margin-top:8px;display:flex;justify-content:space-between;font-weight:bold;color:#78350f';
    total.innerHTML = '<span>合計</span><span>' + totalKcal + ' kcal</span>';
    box.appendChild(total);

    // v3.23.0: 日次の栄養素合計（🥩たんぱく質 / 🧈脂質 / 🍚炭水化物 / 🧂塩分）
    var t = data.totals || { protein_g: 0, fat_g: 0, carbs_g: 0, salt_g: 0 };
    var nutri = document.createElement('div');
    nutri.style.cssText = 'padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px 14px';
    var defs = [
      ['🥩 たんぱく質', t.protein_g],
      ['🧈 脂質', t.fat_g],
      ['🍚 炭水化物', t.carbs_g],
      ['🧂 塩分', t.salt_g]
    ];
    nutri.innerHTML = defs.map(function(d) {
      return '<span style="display:flex;justify-content:space-between;font-size:14px;color:#555">' +
        '<span>' + d[0] + '</span><span style="font-weight:700;color:#78350f">' + (d[1] || 0) + 'g</span></span>';
    }).join('');
    box.appendChild(nutri);
  }).catch(function() {
    document.getElementById('today-meals').innerHTML = '<div style="color:#dc2626">読込失敗</div>';
  });
}

function openWithSig(page) {
  var APP = SanroBoot.getApp();
  window.location.href = APP.deployUrl + '?page=' + page + '&userId=' + encodeURIComponent(APP.userId) + '&sig=' + encodeURIComponent(APP.sig);
}
document.getElementById('btn-calendar').addEventListener('click', function() { openWithSig('calendar'); });
document.getElementById('btn-weight-graph').addEventListener('click', function() { openWithSig('weight_graph'); });
document.getElementById('btn-bp-graph').addEventListener('click', function() { openWithSig('blood_pressure_graph'); });
// v3.17.9: btn-close 廃止 (共通 sanro-back-btn が SanroBoot.close を呼ぶ)
</script>
</body>
</html>
