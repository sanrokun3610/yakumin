<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>検査値 - サンロくんのほけんしつ</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="/common/common.css">
<script>
// v3.25.0: LIFF内ブラウザ強キャッシュ対策 - バージョン違いで強制リロード（meal_input式）
(function() {
  var CURRENT_VERSION = 'v3.28.0';
  window.__APP_BUILD = CURRENT_VERSION;
  try {
    var stored = localStorage.getItem('blood_pressure_version');
    if (stored && stored !== CURRENT_VERSION) {
      localStorage.setItem('blood_pressure_version', CURRENT_VERSION);
      location.replace(location.pathname + '?v=' + CURRENT_VERSION + '&t=' + Date.now());
      return;
    }
    localStorage.setItem('blood_pressure_version', CURRENT_VERSION);
  } catch (e) {}
})();
</script>
</head>
<body>
<div class="sanro-header">
  <!-- v3.28.0: 戻る・血圧・HbA1c をヘッダーに横並び（右上タイトル廃止） -->
  <div class="sanro-header-title" id="exam-header" style="justify-content:flex-start;gap:8px;flex-wrap:wrap">
    <button class="sanro-back-btn" type="button" onclick="SanroBoot.close()">← 戻る</button>
    <button class="sanro-chip selected" data-exam="bp" type="button" style="padding:8px 18px;flex:none">血圧</button>
    <button class="sanro-chip" data-exam="hba1c" type="button" style="padding:8px 18px;flex:none">HbA1c</button>
  </div>
  <div class="sanro-username"></div>
</div>
<div id="sanro-status" class="sanro-status"></div>

<div id="content" class="hidden">
  <div id="sec-bp">
  <div class="sanro-section">
    <div class="sanro-section-title">📝 今の血圧</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div>
        <div style="font-size:14px;color:#555;font-weight:600;margin-bottom:4px">上 (mmHg)</div>
        <input type="text" id="sbp" class="sanro-input" placeholder="例: 128" inputmode="numeric" autofocus enterkeyhint="next">
      </div>
      <div>
        <div style="font-size:14px;color:#555;font-weight:600;margin-bottom:4px">下 (mmHg)</div>
        <input type="text" id="dbp" class="sanro-input" placeholder="例: 82" inputmode="numeric" enterkeyhint="next">
      </div>
    </div>
    <div>
      <div style="font-size:14px;color:#555;font-weight:600;margin-bottom:4px">脈拍 (任意)</div>
      <input type="text" id="pulse" class="sanro-input" placeholder="例: 72" inputmode="numeric" enterkeyhint="done">
    </div>
    <div style="height:8px"></div>
    <div style="font-size:14px;color:#555;font-weight:600;margin-bottom:4px">いつ測ったか</div>
    <div class="sanro-chip-row cols-2">
      <button class="sanro-chip" data-timing="朝">朝</button>
      <button class="sanro-chip" data-timing="夜">夜</button>
    </div>
    <div style="height:8px"></div>
    <button id="btn-save" class="sanro-btn primary">記録する</button>
  </div>

  <div class="sanro-section">
    <div class="sanro-section-title">📊 直近の記録</div>
    <div id="recent-list">読込中…</div>
    <div style="height:8px"></div>
    <button class="sanro-btn outline" id="btn-graph">📈 グラフを見る</button>
  </div>
  </div><!-- /#sec-bp -->

  <!-- v3.24.0: HbA1c（ユーザー自己記録・無料） -->
  <div id="sec-hba1c" class="hidden">
    <div class="sanro-section">
      <div class="sanro-section-title">📝 今のHbA1c</div>
      <div>
        <div style="font-size:14px;color:#555;font-weight:600;margin-bottom:4px">HbA1c (%)</div>
        <input type="text" id="hba1c-val" class="sanro-input" placeholder="例: 6.2" inputmode="decimal" enterkeyhint="done">
      </div>
      <div style="height:8px"></div>
      <div style="font-size:14px;color:#555;font-weight:600;margin-bottom:4px">メモ (任意)</div>
      <input type="text" id="hba1c-memo" class="sanro-input" placeholder="例: 病院で測定" maxlength="100">
      <div style="height:8px"></div>
      <button id="btn-hba1c-save" class="sanro-btn primary">記録する</button>
    </div>

    <div class="sanro-section">
      <div class="sanro-section-title">📊 直近の記録</div>
      <div id="hba1c-recent-list">読込中…</div>
      <div style="height:8px"></div>
      <button class="sanro-btn outline" id="btn-hba1c-graph">📈 グラフを見る</button>
    </div>
  </div>

  <!-- v3.17.9 くまさんFB: 「完了してLINEに戻る」廃止 → ヘッダー左上の共通 ← 戻るに統一 -->
</div>

<script src="/common/common.js"></script>
<script>
SanroBoot.init({
  liffId: '2009608282-AvUr4Jtb',
  deployUrl: 'https://script.google.com/macros/s/AKfycbwqJPueCoeMtpY8WcCAHQjYXIROi8VAaqsbZmuf2iUQ65MG6teaJOC2CwZiGrUNlsd6/exec',
  onReady: function(APP) {
    document.getElementById('content').classList.remove('hidden');
    loadRecent();
    var inp = document.getElementById('sbp');
    function tryFocus() { try { inp.focus(); inp.click(); } catch(e) {} }
    tryFocus();
    setTimeout(tryFocus, 100);
    setTimeout(tryFocus, 300);
    setTimeout(tryFocus, 700);
    // 現在時刻で朝夜を自動選択
    var hour = new Date().getHours();
    var defaultTiming = (hour < 12) ? '朝' : '夜';
    Array.prototype.forEach.call(document.querySelectorAll('[data-timing]'), function(btn) {
      btn.classList.toggle('selected', btn.getAttribute('data-timing') === defaultTiming);
    });
  }
});

var selectedTiming = (new Date().getHours() < 12) ? '朝' : '夜';
Array.prototype.forEach.call(document.querySelectorAll('[data-timing]'), function(btn) {
  btn.addEventListener('click', function() {
    Array.prototype.forEach.call(document.querySelectorAll('[data-timing]'), function(b) {
      b.classList.remove('selected');
    });
    this.classList.add('selected');
    selectedTiming = this.getAttribute('data-timing');
  });
});

function loadRecent() {
  SanroBoot.apiGet('bp_recent').then(function(data) {
    var box = document.getElementById('recent-list');
    if (!data || !data.ok || !data.items || data.items.length === 0) {
      box.innerHTML = '<div style="padding:12px;color:#888;font-size:12px;text-align:center">記録がまだありません</div>';
      return;
    }
    box.innerHTML = '';
    data.items.forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'sanro-list-item';
      var left = document.createElement('span');
      left.innerHTML = '<span class="date">' + SanroBoot.esc(item.date || '') + '</span>　' + SanroBoot.esc(item.timing || '');
      var right = document.createElement('span');
      right.style.cssText = 'display:flex;align-items:center;gap:10px';
      right.innerHTML = '<span class="value">' + (item.sbp || 0) + '/' + (item.dbp || 0) + '</span>';
      // v3.26.0: 削除ボタン
      var del = document.createElement('button');
      del.type = 'button';
      del.textContent = '削除';
      del.style.cssText = 'min-height:36px;padding:6px 12px;font-size:13px;font-weight:600;border:1px solid #fecaca;border-radius:8px;background:#fef2f2;color:#b91c1c;cursor:pointer';
      del.addEventListener('click', function() {
        if (!confirm('この記録（' + (item.date || '') + '  ' + (item.sbp || 0) + '/' + (item.dbp || 0) + '）を削除しますか？')) return;
        del.disabled = true; del.textContent = '削除中…';
        SanroBoot.apiPost('bp_delete', { ts: item.ts }).then(function(d) {
          if (d && d.ok) { SanroBoot.toast('🗑 削除しました', 'success'); loadRecent(); }
          else { SanroBoot.toast('削除失敗: ' + (d && d.error ? d.error : 'unknown'), 'error'); del.disabled = false; del.textContent = '削除'; }
        }).catch(function(){ SanroBoot.toast('削除失敗', 'error'); del.disabled = false; del.textContent = '削除'; });
      });
      right.appendChild(del);
      row.appendChild(left); row.appendChild(right);
      box.appendChild(row);
    });
  }).catch(function() {
    document.getElementById('recent-list').innerHTML = '<div style="color:#dc2626">読込失敗</div>';
  });
}

function normalizeNum(v) {
  if (!v) return 0;
  return Number(String(v).trim().replace(/[０-９]/g, function(ch){return String.fromCharCode(ch.charCodeAt(0)-0xFEE0);}).replace(/[^\d.]/g, ''));
}

document.getElementById('btn-save').addEventListener('click', function() {
  var sbp = normalizeNum(document.getElementById('sbp').value);
  var dbp = normalizeNum(document.getElementById('dbp').value);
  var pulse = normalizeNum(document.getElementById('pulse').value);
  if (!sbp || sbp < 60 || sbp > 250) { SanroBoot.toast('上の血圧を正しく入力してください (60〜250)', 'error'); return; }
  if (!dbp || dbp < 30 || dbp > 200) { SanroBoot.toast('下の血圧を正しく入力してください (30〜200)', 'error'); return; }
  var btn = this;
  setBusy(btn, true);
  SanroBoot.apiPost('bp_save', { sbp: sbp, dbp: dbp, pulse: pulse || 0, timing: selectedTiming }).then(function(data) {
    if (data && data.ok) {
      SanroBoot.toast('✅ ' + sbp + '/' + dbp + ' を記録しました', 'success');
      document.getElementById('sbp').value = '';
      document.getElementById('dbp').value = '';
      document.getElementById('pulse').value = '';
      loadRecent();
    } else {
      SanroBoot.toast('記録失敗: ' + (data && data.error ? data.error : 'unknown'), 'error');
    }
  }).then(function(){ setBusy(btn, false); }, function(){ setBusy(btn, false); });
});

// v3.25.0: 記録中のローディング表示（ボタン無効化＋ラベル切替）
function setBusy(btn, busy) {
  if (!btn) return;
  if (busy) {
    if (!btn.dataset.label) btn.dataset.label = btn.textContent;
    btn.disabled = true;
    btn.textContent = '記録中…';
  } else {
    btn.disabled = false;
    if (btn.dataset.label) btn.textContent = btn.dataset.label;
  }
}

document.getElementById('btn-graph').addEventListener('click', function() {
  var APP = SanroBoot.getApp();
  window.location.href = APP.deployUrl + '?page=blood_pressure_graph&userId=' + encodeURIComponent(APP.userId) + '&sig=' + encodeURIComponent(APP.sig);
});

// v3.26.0: HbA1c推移グラフへ
document.getElementById('btn-hba1c-graph').addEventListener('click', function() {
  var APP = SanroBoot.getApp();
  window.location.href = APP.deployUrl + '?page=hba1c_graph&userId=' + encodeURIComponent(APP.userId) + '&sig=' + encodeURIComponent(APP.sig);
});

// ====== v3.24.0: 検査値タブ切替（血圧 ⇔ HbA1c）======
var hba1cLoaded = false;
Array.prototype.forEach.call(document.querySelectorAll('#exam-header [data-exam]'), function(tab) {
  tab.addEventListener('click', function() {
    Array.prototype.forEach.call(document.querySelectorAll('#exam-header [data-exam]'), function(b) {
      b.classList.remove('selected');
    });
    this.classList.add('selected');
    var exam = this.getAttribute('data-exam');
    document.getElementById('sec-bp').classList.toggle('hidden', exam !== 'bp');
    document.getElementById('sec-hba1c').classList.toggle('hidden', exam !== 'hba1c');
    if (exam === 'hba1c' && !hba1cLoaded) { hba1cLoaded = true; loadHba1cRecent(); }
  });
});

function loadHba1cRecent() {
  SanroBoot.apiGet('hba1c_recent').then(function(data) {
    var box = document.getElementById('hba1c-recent-list');
    if (!data || !data.ok || !data.items || data.items.length === 0) {
      box.innerHTML = '<div style="padding:12px;color:#888;font-size:12px;text-align:center">記録がまだありません</div>';
      return;
    }
    box.innerHTML = '';
    data.items.forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'sanro-list-item';
      var zone = item.zone ? '　' + SanroBoot.esc(item.zone) : '';
      var left = document.createElement('span');
      left.innerHTML = '<span class="date">' + SanroBoot.esc(item.date || '') + '</span>' + zone;
      var right = document.createElement('span');
      right.style.cssText = 'display:flex;align-items:center;gap:10px';
      right.innerHTML = '<span class="value">' + (item.value || 0) + '%</span>';
      // v3.25.0: 削除ボタン
      var del = document.createElement('button');
      del.type = 'button';
      del.textContent = '削除';
      del.style.cssText = 'min-height:36px;padding:6px 12px;font-size:13px;font-weight:600;border:1px solid #fecaca;border-radius:8px;background:#fef2f2;color:#b91c1c;cursor:pointer';
      del.addEventListener('click', function() {
        if (!confirm('この記録（' + (item.date || '') + '  ' + (item.value || 0) + '%）を削除しますか？')) return;
        del.disabled = true; del.textContent = '削除中…';
        SanroBoot.apiPost('hba1c_delete', { ts: item.ts }).then(function(d) {
          if (d && d.ok) { SanroBoot.toast('🗑 削除しました', 'success'); loadHba1cRecent(); }
          else { SanroBoot.toast('削除失敗: ' + (d && d.error ? d.error : 'unknown'), 'error'); del.disabled = false; del.textContent = '削除'; }
        }).catch(function(){ SanroBoot.toast('削除失敗', 'error'); del.disabled = false; del.textContent = '削除'; });
      });
      right.appendChild(del);
      row.appendChild(left); row.appendChild(right);
      box.appendChild(row);
    });
  }).catch(function() {
    document.getElementById('hba1c-recent-list').innerHTML = '<div style="color:#dc2626">読込失敗</div>';
  });
}

document.getElementById('btn-hba1c-save').addEventListener('click', function() {
  var val = normalizeNum(document.getElementById('hba1c-val').value);
  if (!(val >= 3.0 && val <= 20.0)) { SanroBoot.toast('HbA1cを正しく入力してください (3.0〜20.0)', 'error'); return; }
  var memo = document.getElementById('hba1c-memo').value || '';
  var btn = this;
  setBusy(btn, true);
  SanroBoot.apiPost('hba1c_save', { value: val, memo: memo }).then(function(data) {
    if (data && data.ok) {
      SanroBoot.toast('✅ HbA1c ' + data.value + '% を記録しました', 'success');
      document.getElementById('hba1c-val').value = '';
      document.getElementById('hba1c-memo').value = '';
      loadHba1cRecent();
    } else {
      SanroBoot.toast('記録失敗: ' + (data && data.error ? data.error : 'unknown'), 'error');
    }
  }).then(function(){ setBusy(btn, false); }, function(){ setBusy(btn, false); });
});

// v3.17.9: btn-close 廃止 (共通 sanro-back-btn が SanroBoot.close を呼ぶ)
</script>
</body>
</html>
